components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationIssue:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: array
          items:
            type: string
        expected:
          type: string
          nullable: true
        received:
          type: string
          nullable: true
    ValidationErrorResponse:
      type: object
      properties:
        Erro de Validação:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    Voluntario:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
          format: email
        admin:
          type: boolean
        endereco:
          type: string
          nullable: true
        telefone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VoluntarioInput:
      type: object
      required: [nome, email, senha]
      properties:
        nome:
          type: string
          example: Ana Souza
        email:
          type: string
          format: email
          example: ana@sanem.com
        senha:
          type: string
          format: password
          example: senha123
        admin:
          type: boolean
          example: false
        endereco:
          type: string
          nullable: true
          example: Rua das Flores, 123
        telefone:
          type: string
          nullable: true
          example: 11999998888
    VoluntarioUpdate:
      type: object
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        senha:
          type: string
          format: password
        admin:
          type: boolean
        endereco:
          type: string
          nullable: true
        telefone:
          type: string
          nullable: true
    Tipo:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
    Tamanho:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
        tipoId:
          type: integer
    Condicao:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
    Beneficiario:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        cpf:
          type: string
        telefone:
          type: string
          nullable: true
        endereco:
          type: string
          nullable: true
        limiteItens:
          type: integer
          description: Limite máximo de itens que o beneficiário pode receber (0 = sem limite)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BeneficiarioInput:
      type: object
      required: [nome, cpf]
      properties:
        nome:
          type: string
          example: Jose da Silva
        cpf:
          type: string
          description: Somente números
          example: '11122233344'
        telefone:
          type: string
          example: '11912345678'
          nullable: true
        endereco:
          type: string
          example: 'Rua das Flores, 123'
          nullable: true
        limiteItens:
          type: integer
          description: 0 para sem limite; maior que 0 para limitar
    ItemCatalog:
      type: object
      properties:
        id:
          type: integer
        quantidadeEstoque:
          type: integer
        condicaoId:
          type: integer
        tipoId:
          type: integer
        tamanhoId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ItemDetalhe:
      type: object
      properties:
        id:
          type: integer
        quantidadeEstoque:
          type: integer
        tipo:
          type: object
          properties:
            id:
              type: integer
            descricao:
              type: string
        tamanho:
          type: object
          properties:
            id:
              type: integer
            descricao:
              type: string
        condicao:
          type: object
          properties:
            id:
              type: integer
            descricao:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ItemQuantidadeInput:
      type: object
      required: [quantidade]
      properties:
        quantidade:
          type: integer
          minimum: 0
    DashboardMetrics:
      type: object
      properties:
        voluntarios:
          type: integer
        beneficiarios:
          type: integer
        doacoes:
          type: integer
        distribuicoes:
          type: integer
        estoqueTotal:
          type: integer
        itensBaixoEstoque:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              quantidadeEstoque:
                type: integer
              tipo:
                type: object
                properties:
                  descricao:
                    type: string
              tamanho:
                type: object
                properties:
                  descricao:
                    type: string
              condicao:
                type: object
                properties:
                  descricao:
                    type: string
    MovimentacoesReport:
      type: object
      properties:
        periodo:
          type: object
          properties:
            inicio:
              type: string
              format: date-time
              nullable: true
            fim:
              type: string
              format: date-time
              nullable: true
        resumo:
          type: object
          properties:
            totalEntradas:
              type: number
            totalSaidas:
              type: number
        doacoes:
          type: array
          items:
            $ref: '#/components/schemas/Doacao'
        distribuicoes:
          type: array
          items:
            $ref: '#/components/schemas/DistribuicaoDetalhe'
    ItemDoacao:
      type: object
      properties:
        doacaoId:
          type: integer
        itemId:
          type: integer
        quantidade:
          type: number
    ItemDoacaoDetalhado:
      allOf:
        - $ref: '#/components/schemas/ItemDoacao'
        - type: object
          properties:
            id:
              type: integer
            item:
              $ref: '#/components/schemas/ItemCatalog'
    Doacao:
      type: object
      properties:
        id:
          type: integer
        voluntarioId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        itens:
          type: array
          items:
            $ref: '#/components/schemas/ItemDoacaoDetalhado'
    DoacaoInput:
      type: object
      required: [itens]
      properties:
        itens:
          type: array
          minItems: 1
          items:
            type: object
            required: [tipoId, tamanhoId, condicaoId, quantidade]
            properties:
              tipoId:
                type: integer
              tamanhoId:
                type: integer
              condicaoId:
                type: integer
              quantidade:
                type: number
    Cartao:
      type: object
      properties:
        id:
          type: integer
        numeroCartao:
          type: string
        dataValidade:
          type: string
          format: date-time
        codigoSeguranca:
          type: string
        ativo:
          type: boolean
        beneficiarioId:
          type: integer
    CartaoComBeneficiario:
      allOf:
        - $ref: '#/components/schemas/Cartao'
        - type: object
          properties:
            beneficiario:
              type: object
              properties:
                nome:
                  type: string
                cpf:
                  type: string
    ItemDistribuicaoInput:
      type: object
      required: [tipoId, tamanhoId, condicaoId, quantidade]
      properties:
        tipoId:
          type: integer
        tamanhoId:
          type: integer
        condicaoId:
          type: integer
        quantidade:
          type: integer
    DistribuicaoInput:
      type: object
      required: [beneficiarioId, cartaoNumero, itens]
      properties:
        beneficiarioId:
          type: integer
        cartaoNumero:
          type: string
          description: Número do cartão ativo do beneficiário (somente dígitos)
        itens:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ItemDistribuicaoInput'
    Distribuicao:
      type: object
      properties:
        id:
          type: integer
        voluntarioId:
          type: integer
        beneficiarioId:
          type: integer
        createdAt:
          type: string
          format: date-time
    ItemDistribuicaoDetalhe:
      type: object
      properties:
        quantidade:
          type: integer
        item:
          type: object
          properties:
            id:
              type: integer
            tipo:
              type: object
              properties:
                descricao:
                  type: string
            tamanho:
              type: object
              properties:
                descricao:
                  type: string
            condicao:
              type: object
              properties:
                descricao:
                  type: string
    DistribuicaoDetalhe:
      allOf:
        - $ref: '#/components/schemas/Distribuicao'
        - type: object
          properties:
            voluntario:
              type: object
              properties:
                nome:
                  type: string
            beneficiario:
              type: object
              properties:
                nome:
                  type: string
            itens:
              type: array
              items:
                $ref: '#/components/schemas/ItemDistribuicaoDetalhe'
