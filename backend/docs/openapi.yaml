      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ativo]
              properties:
                ativo:
                  type: boolean
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cartao'
