              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /doacoes/{id}:
    get:
      tags: [Doações]
